version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: swipelab-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-swipelab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build:
      context: ./backend
    container_name: swipelab-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=mock
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME:-swipelab}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

  frontend:
    build:
      context: ./frontend
      args:
        - EXPO_PUBLIC_API_URL=http://132.73.84.74
    container_name: swipelab-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
