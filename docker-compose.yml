version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: swipelab-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-swipelab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build:
      context: ./backend
    container_name: swipelab-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME:-swipelab}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - DATABASE_URL=jdbc:postgresql://db:5432/${DB_NAME:-swipelab}
      - DB_USERNAME=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - STARDBI_SERVICE_ACCOUNT_USERNAME=${STARDBI_SERVICE_ACCOUNT_USERNAME}
      - STARDBI_SERVICE_ACCOUNT_PASSWORD=${STARDBI_SERVICE_ACCOUNT_PASSWORD}

  frontend:
    build:
      context: ./frontend
      args:
        - EXPO_PUBLIC_API_URL=https://swipelab.cs.bgu.ac.il
        - EXPO_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: swipelab-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  crops_data:
