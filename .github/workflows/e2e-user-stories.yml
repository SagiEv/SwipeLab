name: E2E User Stories Tests

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run E2E User Stories
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swipelab_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: 'backend/pom.xml'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Make Maven Wrapper executable
      run: chmod +x ./mvnw
      working-directory: ./backend

    - name: Start Backend in Background
      run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=e2e &
      working-directory: ./backend

    - name: Wait for Backend to be Ready
      run: |
        timeout 180 bash -c 'while ! nc -z localhost 8080; do sleep 5; done'
        echo "Backend is up!"

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: ./frontend

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      working-directory: ./frontend

    - name: Run E2E Tests
      run: npm run test:e2e:stories
      working-directory: ./frontend

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 14
