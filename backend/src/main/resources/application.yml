spring:
  application:
    name: SwipeLab
  config:
    import: optional:file:.env[.properties]

  # Reference-image uploads: cap raw upload size before ImageProcessingService
  # compresses further. 5 MB per file / 20 MB per multipart request.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration


  datasource:
    url: jdbc:postgresql://localhost:5432/swipelab
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:your-dedicated-project-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXRlbXBvcmFyeS1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u}
  access-token-expiration-minutes: 1440
  refresh-token-expiration-days: 30
  issuer: swipelab

# CORS Configuration
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:19000,http://localhost:8081}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Logging
logging:
  level:
    com.swipelab: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG

# Custom App Configuration
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:8081}
  auto-verify-emails: ${AUTO_VERIFY_EMAILS:false}
  security:
    super-admin:
      username: ${SUPER_ADMIN_USERNAME:superadmin@swipelab.com}
      password: ${SUPER_ADMIN_PASSWORD:superpassword123}
  fraud-detection:
    # ── Regular Users ──────────────────────────────────────────────────────────
    # A single classification faster than this is flagged as suspicious
    min-response-time-ms: 300
    # ── Researchers ────────────────────────────────────────────────────────────
    # Domain experts legitimately swipe faster; a lower threshold prevents false positives
    researcher-min-response-time-ms: 150
    # ── Sliding-window strike accumulation ─────────────────────────────────────
    # How many suspicious classifications within the window produce one STRIKE
    suspicious-count-for-strike: 3
    # Duration of the sliding window in minutes
    sliding-window-minutes: 10
    # ── Escalation ladder ──────────────────────────────────────────────────────
    strikes-for-warning-1: 5
    strikes-for-warning-2: 10
    strikes-for-ban: 15
    # ── Credibility penalties (absolute score points, not percentage) ──────────
    credibility-penalty-warning-1: 5.0
    credibility-penalty-warning-2: 15.0
    # ── Warning cooldown (prevents warning spam on a bad session) ──────────────
    warning-cooldown-minutes: 30
    # ── Organic recovery ───────────────────────────────────────────────────────
    # Consecutive correct gold-image answers to remove one strike
    correct-golds-to-recover-strike: 10
  credibility:
    # Minimum classifications on an (imageId, querySpecies) pair before it
    # contributes to credibility (below this, no consensus exists yet)
    min-classifications-for-consensus: 3
    # Composite score weights (must conceptually sum to 1.0)
    weight-gold: 0.40
    weight-majority: 0.35
    weight-expert: 0.25
    # Starting score for new users (neutral position on 0-100 scale)
    default-score: 50.0
    # Malicious-labeling detection: flag user when score drops below threshold
    # after accumulating at least malicious-min-samples classifications
    malicious-threshold: 15.0
    malicious-min-samples: 20

# Stardbi Configuration
stardbi:
  api:
    url: ${STARDBI_API_URL:https://stardbi.cs.bgu.ac.il}
  service-account:
    username: ${STARDBI_SERVICE_ACCOUNT_USERNAME:swipelab_server}
    password: ${STARDBI_SERVICE_ACCOUNT_PASSWORD:default_password}